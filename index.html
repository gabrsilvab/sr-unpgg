<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Spicy Renegade | Sr. (Unplugged)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #ff2d55;
            --glass: rgba(20, 20, 20, 0.85);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            overflow-x: hidden;
        }

        /* --- Liquid Glass Background --- */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111, #000);
        }

        .blob {
            position: absolute;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.12) 0%, transparent 70%);
            filter: blur(100px);
            border-radius: 50%;
            animation: moveBlob 20s infinite alternate ease-in-out;
        }

        @keyframes moveBlob {
            from { transform: translate(-15%, -15%); }
            to { transform: translate(25%, 25%); }
        }

        .container { width: 100%; max-width: 850px; z-index: 1; }

        header { margin-bottom: 50px; }
        header span { color: var(--accent); font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 4px; display: block; margin-bottom: 8px; }
        header h1 { font-size: 58px; font-weight: 900; letter-spacing: -3px; line-height: 1; }

        /* --- Player Card --- */
        .album-card {
            background: var(--glass);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--border);
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .track {
            display: flex;
            align-items: center;
            padding: 24px 35px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .track:last-child { border-bottom: none; }
        .track:hover { background: rgba(255, 255, 255, 0.05); }
        .track.active { background: rgba(255, 45, 85, 0.15); }

        .t-num { width: 45px; color: #444; font-weight: 700; font-size: 14px; }
        .t-info { flex: 1; }
        .t-info b { font-size: 19px; display: block; }
        .t-info span { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .t-icon { 
            width: 44px; height: 44px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
            transition: 0.3s;
        }

        .track.active .t-icon { background: var(--accent); color: white; transform: scale(1.1); }

        /* --- Visualizer --- */
        .visualizer {
            padding: 30px;
            background: rgba(0,0,0,0.4);
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .playing-text { 
            font-size: 12px; color: var(--accent); font-weight: 700; 
            margin-bottom: 8px; display: none; letter-spacing: 2px;
        }

        /* --- Footer Button --- */
        .btn-footer {
            margin-top: 60px;
            padding: 20px 50px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-footer:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(255,255,255,0.2); }

    </style>
</head>
<body>

    <div class="liquid-bg"><div class="blob"></div></div>

    <div class="container">
        <header>
            <span>Spicy Renegade • 2026</span>
            <h1>Sr. (Unplugged)</h1>
        </header>

        <div class="album-card">
            <div class="track" onclick="playAudio(this, 'Sr. I-II')">
                <span class="t-num">01</span>
                <div class="t-info">
                    <b>Sr. I-II</b>
                    <span>Spicy Renegade</span>
                </div>
                <div class="t-icon">▶</div>
            </div>

            <div class="track" onclick="playAudio(this, 'Cosmonauta')">
                <span class="t-num">02</span>
                <div class="t-info">
                    <b>Cosmonauta</b>
                    <span>Spicy Renegade</span>
                </div>
                <div class="t-icon">▶</div>
            </div>

            <div class="track" onclick="playAudio(this, 'Vá Para os Trilhos')">
                <span class="t-num">03</span>
                <div class="t-info">
                    <b>Vá Para os Trilhos</b>
                    <span>Spicy Renegade</span>
                </div>
                <div class="t-icon">▶</div>
            </div>

            <div class="track" onclick="playAudio(this, 'Night Illusion')">
                <span class="t-num">04</span>
                <div class="t-info">
                    <b>Night Illusion</b>
                    <span>Spicy Renegade</span>
                </div>
                <div class="t-icon">▶</div>
            </div>

            <div class="track" onclick="playAudio(this, 'Sr. III-V')">
                <span class="t-num">05</span>
                <div class="t-info">
                    <b>Sr. III-V</b>
                    <span>Spicy Renegade</span>
                </div>
                <div class="t-icon">▶</div>
            </div>

            <div class="visualizer">
                <div class="playing-text" id="now-playing">REPRODUZINDO...</div>
                <p style="color: #444; font-size: 11px;">© 2026 ONEABRIL RECORDS • CLOUD STREAMING</p>
            </div>
        </div>

        <audio id="audio-player">
            <source src="https://res.cloudinary.com/dhwyx3xh4/video/upload/v1775072135/Sound_Effects_and_Soundtrack_-_Amplifier_Sound_-_STESFX_Reviews_and_sounds_youtube_macdu2.mp3" type="audio/mpeg">
        </audio>

        <div style="text-align: center;">
            <a href="https://gabrsilvab.github.io/sr-unpgg/sr/index.html" class="btn-footer">desbloquear restante</a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const status = document.getElementById('now-playing');

        function playAudio(element, trackName) {
            document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            status.style.display = 'block';
            status.innerText = 'REPRODUZINDO: ' + trackName.toUpperCase();

            audio.currentTime = 0; 
            audio.play().catch(e => {
                alert("Clique novamente para iniciar o som!");
            });
        }
    </script>
</body>
</html>
